<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distributive Property — Sort &amp; Match</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f4f3ef;
    color: #1a1a1a;
  }

  /* ── Page shell: header + two-col body fills viewport ── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 12px;
  }

  /* ── Header ── */
  .topbar {
    flex-shrink: 0;
    padding: 16px 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid #e0ddd7;
  }
  .topbar-left h1 { font-size: 17px; font-weight: 600; line-height: 1.2; }
  .topbar-left p  { font-size: 12px; color: #777; margin-top: 2px; }

  .round-badge {
    display: inline-block;
    background: #1a1a1a; color: #fff;
    font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 99px;
    margin-bottom: 4px;
  }

  .topbar-controls {
    display: flex; gap: 8px; flex-shrink: 0;
  }
  button {
    font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: 7px;
    border: none; cursor: pointer; transition: background .15s;
    white-space: nowrap;
  }
  .btn-check          { background: #1a1a1a; color: #fff; }
  .btn-check:hover    { background: #333; }
  .btn-check:disabled { background: #bbb; cursor: default; }
  .btn-secondary           { background: #e8e6e1; color: #333; }
  .btn-secondary:hover     { background: #d8d5cf; }

  /* ── Two-column work area ── */
  .work-area {
    flex: 1;
    display: flex;
    gap: 16px;
    overflow: hidden;   /* children scroll independently */
    padding: 14px 0;
  }

  /* LEFT: scrollable strip bank */
  .strip-panel {
    flex: 1;
    overflow-y: auto;
    padding-right: 6px;
  }
  .strip-panel-label {
    font-size: 11px; font-weight: 500; color: #888;
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 10px;
  }
  .strips-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .strip {
    background: #fff;
    border: 1.5px dashed #bbb;
    border-radius: 8px;
    padding: 10px 10px;
    font-size: 13px; text-align: center;
    cursor: grab;
    transition: opacity .15s, transform .15s, border-color .15s;
    user-select: none; line-height: 1.5;
  }
  .strip:hover    { border-color: #888; }
  .strip:active   { cursor: grabbing; }
  .strip.dragging { opacity: .35; transform: scale(.96); }
  .strip.placed   { opacity: .25; pointer-events: none; border-style: solid; border-color: #ccc; }

  /* RIGHT: sticky group columns */
  .group-panel {
    width: 300px;
    flex-shrink: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .group-panel-label {
    font-size: 11px; font-weight: 500; color: #888;
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 2px;
  }

  .target-wrap { display: flex; flex-direction: column; }

  .target-header {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 2px dashed #bbb;
    border-radius: 10px 10px 0 0;
    padding: 10px 14px;
    transition: border-color .2s, background .2s;
  }
  .target-header.drag-over  { border-color: #333; background: #f0eeea; }
  .target-header.correct    { border-color: #2d8a4e; background: #edf7f1; }
  .target-header.incorrect  { border-color: #c0392b; background: #fdf0ef; }

  .target-letter {
    font-size: 10px; font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: .06em;
    flex-shrink: 0;
  }
  .target-expr {
    font-size: 15px; font-weight: 700; color: #1a1a1a;
  }

  /* drop zone below the header */
  .drop-zone {
    min-height: 48px;
    border: 2px dashed #ddd;
    border-top: none;
    border-radius: 0 0 10px 10px;
    background: #fafaf8;
    padding: 6px 8px;
    display: flex; flex-direction: column; gap: 5px;
    transition: border-color .2s, background .2s;
  }
  .drop-zone.drag-over { border-color: #999; background: #f0eeea; }

  .matched-strip {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 12px; text-align: center;
    cursor: pointer;
    line-height: 1.4;
  }
  .matched-strip:hover { border-color: #bbb; }
  .matched-strip.correct-strip   { border-color: #2d8a4e; color: #1a5c33; background: #edf7f1; cursor: default; }
  .matched-strip.incorrect-strip { border-color: #c0392b; color: #7a1a12; background: #fdf0ef; }

  /* ── Score banner ── */
  .score-banner {
    flex-shrink: 0;
    display: none;
    text-align: center;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 10px;
  }
  .score-banner.show    { display: block; }
  .score-banner.perfect { background: #edf7f1; color: #1a5c33; border: 1px solid #2d8a4e; }
  .score-banner.partial { background: #fffbe6; color: #7a5c00; border: 1px solid #c9a200; }
</style>
</head>
<body>

<div class="shell">

  <!-- Header bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="round-badge" id="roundBadge">Round 1</div>
      <h1>Distributive Property — Sort &amp; Match</h1>
      <p>Expand each strip, then drag it onto the matching group.</p>
    </div>
    <div class="topbar-controls">
      <button class="btn-check"     id="btnCheck" onclick="checkAnswers()">Check</button>
      <button class="btn-secondary" onclick="resetRound()">Reset</button>
      <button class="btn-secondary" onclick="newRound()">New round</button>
    </div>
  </div>

  <!-- Score banner sits between header and work area -->
  <div class="score-banner" id="scoreBanner"></div>

  <!-- Two-column work area -->
  <div class="work-area">

    <!-- LEFT: strips -->
    <div class="strip-panel">
      <div class="strip-panel-label">Expression strips</div>
      <div class="strips-grid" id="stripsGrid"></div>
    </div>

    <!-- RIGHT: drop targets -->
    <div class="group-panel">
      <div class="group-panel-label">Groups</div>
      <div id="targetsCol"></div>
    </div>

  </div>
</div>

<script>
const ROUNDS = [
  {
    groups: [
      { id:"A", display:"2x + 8" },
      { id:"B", display:"3x + 6" },
      { id:"C", display:"4x + 10" },
    ],
    strips: [
      { expr:"2(x + 4)",                    group:"A" },
      { expr:"3(x + 4) \u2212 x \u2212 4",  group:"A" },
      { expr:"4(x + 2) \u2212 2x",          group:"A" },
      { expr:"2(x + 3) + 2",                group:"A" },
      { expr:"5(x + 2) \u2212 3x \u2212 2", group:"A" },
      { expr:"3(x + 1) \u2212 x + 5",       group:"A" },
      { expr:"2(2x + 4) \u2212 2x",         group:"A" },
      { expr:"4(x + 4) \u2212 2x \u2212 8", group:"A" },
      { expr:"3(x + 2)",                    group:"B" },
      { expr:"5(x + 2) \u2212 2x \u2212 4", group:"B" },
      { expr:"2(x + 3) + x",                group:"B" },
      { expr:"4(x + 2) \u2212 x \u2212 2",  group:"B" },
      { expr:"6(x + 1) \u2212 3x",          group:"B" },
      { expr:"3(x + 4) \u2212 6",           group:"B" },
      { expr:"2(2x + 3) \u2212 x",          group:"B" },
      { expr:"3(2x + 3) \u2212 3x \u2212 3",group:"B" },
      { expr:"2(2x + 5)",                   group:"C" },
      { expr:"5(x + 2) \u2212 x",           group:"C" },
      { expr:"3(x + 4) + x \u2212 2",       group:"C" },
      { expr:"2(3x + 5) \u2212 2x",         group:"C" },
      { expr:"4(x + 3) \u2212 2",           group:"C" },
      { expr:"6(x + 2) \u2212 2x \u2212 2", group:"C" },
      { expr:"2(x + 5) + 2x",               group:"C" },
      { expr:"5(2x + 2) \u2212 6x",         group:"C" },
    ]
  },
  {
    groups: [
      { id:"A", display:"3x + 12" },
      { id:"B", display:"5x \u2212 10" },
      { id:"C", display:"2x + 2" },
    ],
    strips: [
      { expr:"3(x + 4)",                     group:"A" },
      { expr:"5(x + 4) \u2212 2x \u2212 8",  group:"A" },
      { expr:"4(x + 3) \u2212 x",            group:"A" },
      { expr:"2(x + 6) + x",                 group:"A" },
      { expr:"6(x + 2) \u2212 3x",           group:"A" },
      { expr:"3(x + 5) \u2212 3",            group:"A" },
      { expr:"2(2x + 6) \u2212 x",           group:"A" },
      { expr:"5(x + 3) \u2212 2x \u2212 3",  group:"A" },
      { expr:"5(x \u2212 2)",                group:"B" },
      { expr:"6(x \u2212 2) \u2212 x + 2",   group:"B" },
      { expr:"3(x \u2212 4) + 2x + 2",       group:"B" },
      { expr:"4(x \u2212 3) + x + 2",        group:"B" },
      { expr:"2(2x \u2212 5) + x",           group:"B" },
      { expr:"5(2x \u2212 2) \u2212 5x",     group:"B" },
      { expr:"3(x \u2212 2) + 2(x \u2212 2)",group:"B" },
      { expr:"7(x \u2212 2) \u2212 2x + 4",  group:"B" },
      { expr:"2(x + 1)",                     group:"C" },
      { expr:"4(x + 2) \u2212 2x \u2212 6",  group:"C" },
      { expr:"3(x + 2) \u2212 x \u2212 4",   group:"C" },
      { expr:"5(x + 1) \u2212 3x \u2212 3",  group:"C" },
      { expr:"2(3x + 1) \u2212 4x",          group:"C" },
      { expr:"3(x + 1) \u2212 x \u2212 1",   group:"C" },
      { expr:"2(x + 4) \u2212 6",            group:"C" },
      { expr:"4(x + 1) \u2212 2x \u2212 2",  group:"C" },
    ]
  },
  {
    groups: [
      { id:"A", display:"4x \u2212 4" },
      { id:"B", display:"6x + 3" },
      { id:"C", display:"x + 10" },
    ],
    strips: [
      { expr:"4(x \u2212 1)",                group:"A" },
      { expr:"2(2x \u2212 2)",               group:"A" },
      { expr:"5(x \u2212 1) \u2212 x + 1",   group:"A" },
      { expr:"3(x \u2212 2) + x + 2",        group:"A" },
      { expr:"6(x \u2212 1) \u2212 2x + 2",  group:"A" },
      { expr:"2(3x \u2212 2) \u2212 2x",     group:"A" },
      { expr:"4(2x \u2212 1) \u2212 4x",     group:"A" },
      { expr:"2(x \u2212 2) + 2x",           group:"A" },
      { expr:"3(2x + 1)",                    group:"B" },
      { expr:"2(3x + 2) \u2212 1",           group:"B" },
      { expr:"4(x + 1) + 2x \u2212 1",       group:"B" },
      { expr:"5(x + 1) + x \u2212 2",        group:"B" },
      { expr:"3(2x + 3) \u2212 6",           group:"B" },
      { expr:"2(2x + 1) + 2x + 1",          group:"B" },
      { expr:"6(x + 1) \u2212 3",            group:"B" },
      { expr:"3(3x + 2) \u2212 3x \u2212 3", group:"B" },
      { expr:"2(x + 5) \u2212 x",            group:"C" },
      { expr:"3(x + 4) \u2212 2x \u2212 2",  group:"C" },
      { expr:"4(x + 3) \u2212 3x \u2212 2",  group:"C" },
      { expr:"5(x + 2) \u2212 4x",           group:"C" },
      { expr:"4(2 + x) \u2212 3x + 2",       group:"C" },
      { expr:"6(x + 2) \u2212 5x \u2212 2",  group:"C" },
      { expr:"3(x + 5) \u2212 2x \u2212 5",  group:"C" },
      { expr:"2(x + 6) \u2212 x \u2212 2",   group:"C" },
    ]
  },
];

let roundIndex = 0, currentRound = null, activeStripIds = [];
let placements = {}, dragStripIdx = null, checked = false;

function pickStrips(round) {
  const byGroup = {};
  round.groups.forEach(g => byGroup[g.id] = []);
  round.strips.forEach((s, i) => byGroup[s.group].push(i));
  let chosen = [];
  round.groups.forEach(g => {
    const pool = byGroup[g.id].slice();
    shuffle(pool);
    chosen = chosen.concat(pool.slice(0, 8));
  });
  shuffle(chosen);
  return chosen;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function startRound() {
  checked = false; placements = {};
  currentRound = ROUNDS[roundIndex % ROUNDS.length];
  activeStripIds = pickStrips(currentRound);
  document.getElementById('roundBadge').textContent = `Round ${roundIndex + 1}`;
  document.getElementById('scoreBanner').className = 'score-banner';
  document.getElementById('btnCheck').disabled = false;
  renderTargets();
  renderStrips();
}

function renderTargets() {
  const col = document.getElementById('targetsCol');
  col.innerHTML = '';
  col.style.display = 'flex';
  col.style.flexDirection = 'column';
  col.style.gap = '12px';

  currentRound.groups.forEach(g => {
    const wrap = document.createElement('div');
    wrap.className = 'target-wrap';

    const header = document.createElement('div');
    header.className = 'target-header';
    header.id = `target-${g.id}`;
    header.innerHTML = `<span class="target-letter">Group ${g.id}</span><span class="target-expr">${g.display}</span>`;

    const zone = document.createElement('div');
    zone.className = 'drop-zone';
    zone.id = `zone-${g.id}`;

    // Both the header and the drop zone accept drops
    [header, zone].forEach(el => {
      el.addEventListener('dragover', e => {
        e.preventDefault();
        header.classList.add('drag-over');
        zone.classList.add('drag-over');
      });
      el.addEventListener('dragleave', e => {
        // only remove if leaving the whole target-wrap
        if (!wrap.contains(e.relatedTarget)) {
          header.classList.remove('drag-over');
          zone.classList.remove('drag-over');
        }
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        header.classList.remove('drag-over');
        zone.classList.remove('drag-over');
        if (dragStripIdx !== null) dropOnGroup(g.id, dragStripIdx);
      });
    });

    wrap.appendChild(header);
    wrap.appendChild(zone);
    col.appendChild(wrap);
  });
}

function renderStrips() {
  const grid = document.getElementById('stripsGrid');
  grid.innerHTML = '';
  activeStripIds.forEach(idx => {
    const s = currentRound.strips[idx];
    const el = document.createElement('div');
    el.className = 'strip';
    el.draggable = true;
    el.id = `strip-${idx}`;
    el.innerHTML = s.expr;
    el.addEventListener('dragstart', e => {
      dragStripIdx = idx;
      // pass expr as drag data so it's accessible on drop
      e.dataTransfer.setData('text/plain', idx);
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      dragStripIdx = null;
    });
    grid.appendChild(el);
  });
}

function dropOnGroup(groupId, idx) {
  if (checked) return;
  // If already placed elsewhere, remove first
  if (placements[idx] !== undefined) removeFromZone(placements[idx], idx);
  placements[idx] = groupId;
  document.getElementById(`strip-${idx}`)?.classList.add('placed');

  const zone = document.getElementById(`zone-${groupId}`);
  const tag = document.createElement('div');
  tag.className = 'matched-strip';
  tag.id = `tag-${idx}`;
  tag.innerHTML = currentRound.strips[idx].expr;
  tag.title = 'Click to remove';
  tag.addEventListener('click', () => {
    if (checked) return;
    removeFromZone(groupId, idx);
    delete placements[idx];
    document.getElementById(`strip-${idx}`)?.classList.remove('placed');
  });
  zone.appendChild(tag);
}

function removeFromZone(groupId, idx) {
  document.getElementById(`tag-${idx}`)?.remove();
}

function checkAnswers() {
  if (checked) return;
  checked = true;
  let correct = 0;
  const total = activeStripIds.length;

  activeStripIds.forEach(idx => {
    const s = currentRound.strips[idx];
    const tag = document.getElementById(`tag-${idx}`);
    if (!placements[idx] || !tag) return;
    if (placements[idx] === s.group) {
      tag.classList.add('correct-strip'); correct++;
    } else {
      tag.classList.add('incorrect-strip');
    }
  });

  currentRound.groups.forEach(g => {
    const header = document.getElementById(`target-${g.id}`);
    const gs = activeStripIds.filter(i => currentRound.strips[i].group === g.id);
    header.classList.add(gs.every(i => placements[i] === g.id) ? 'correct' : 'incorrect');
  });

  const banner = document.getElementById('scoreBanner');
  const placed = Object.keys(placements).length;
  if (correct === total) {
    banner.textContent = `All ${total} expressions matched correctly.`;
    banner.className = 'score-banner show perfect';
  } else {
    banner.textContent = `${correct} of ${placed} placed expressions are correct. Click incorrect strips to remove and try again.`;
    banner.className = 'score-banner show partial';
    checked = false;
    document.getElementById('btnCheck').disabled = false;
  }
}

function resetRound() { startRound(); }
function newRound()   { roundIndex++; startRound(); }

startRound();
</script>
</body>
</html>
